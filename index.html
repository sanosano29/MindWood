<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindWood | Order Form</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root {
            --primary-color: #d4a373;
            --secondary-color: #8b5a2b;
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
        }

        /* ჩამოსაშლელი მენიუს სტილი (Dropdown) */
        .dropdown {
            position: absolute;
            top: 20px;
            right: 20px;
            display: inline-block;
            z-index: 100;
        }

        .dropbtn {
            background-color: #262626;
            color: white;
            padding: 10px 15px;
            font-size: 16px;
            border: 1px solid #444;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 80px;
        }

        .dropbtn img { width: 25px; border-radius: 2px; }

        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            background-color: #262626;
            min-width: 100px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.5);
            border-radius: 8px;
            margin-top: 5px;
            border: 1px solid #444;
            overflow: hidden;
        }

        .dropdown-content button {
            color: white;
            padding: 12px 16px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            background: none;
            border: none;
            width: 100%;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
            text-transform: none; /* რომ ღილაკის სტილი არ გადაყვეს */
        }

        .dropdown-content button img { width: 20px; border-radius: 2px; }
        .dropdown-content button:hover { background-color: #333; }
        .dropdown:hover .dropdown-content { display: block; }
        .dropdown:hover .dropbtn { border-color: var(--primary-color); }

        /* ფორმის სტილები */
        .container {
            background-color: var(--card-bg);
            width: 90%;
            max-width: 420px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            border: 1px solid #333;
            position: relative;
        }

        .container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, var(--secondary-color), var(--primary-color));
        }

        h2 { text-align: center; color: var(--primary-color); text-transform: uppercase; margin-top: 0; letter-spacing: 1px;}
        p.subtitle { text-align: center; font-size: 14px; color: #888; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 12px; font-weight: bold; color: var(--primary-color); text-transform: uppercase;}
        input { width: 100%; padding: 14px; background: #262626; border: 1px solid #3d3d3d; border-radius: 8px; color: white; box-sizing: border-box; }
        button#submit-btn { width: 100%; padding: 16px; background: linear-gradient(45deg, var(--secondary-color), var(--primary-color)); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        button#submit-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(139, 90, 43, 0.4); }
    </style>
</head>
<body>

    <div class="dropdown">
        <button class="dropbtn" id="active-lang">
            <img src="https://flagcdn.com/w40/ge.png" alt="GE"> KA
        </button>
        <div class="dropdown-content">
            <button onclick="changeLanguage('ka')"><img src="https://flagcdn.com/w40/ge.png"> Georgian</button>
            <button onclick="changeLanguage('en')"><img src="https://flagcdn.com/w40/us.png"> English</button>
            <button onclick="changeLanguage('ru')"><img src="https://flagcdn.com/w40/ru.png"> Russian</button>
        </div>
    </div>

    <div class="container">
        <h2 id="title">MindWood</h2>
        <p class="subtitle" id="subtitle">შეავსეთ ფორმა შეკვეთისთვის</p>
        <form id="contact-form">
            <div class="input-group">
                <label id="label-name">სახელი და გვარი</label>
                <input type="text" name="user_name" id="input-name" placeholder="მაგ: გიორგი ბერიძე" required>
            </div>
            <div class="input-group">
                <label id="label-phone">ტელეფონის ნომერი</label>
                <input type="tel" name="user_phone" id="input-phone" placeholder="599 00 00 00" required>
            </div>
            <div class="input-group">
                <label id="label-color">მასალა / ფერი</label>
                <input type="text" name="laminate_color" id="input-color" placeholder="მაგ: მუხა, კაკალი..." required>
            </div>
            <button type="submit" id="submit-btn">შეკვეთის გაგზავნა</button>
        </form>
    </div>
<script> const translations = {
    ka: { 
        subtitle: "შეავსეთ ფორმა შეკვეთისთვის", 
        labelName: "სახელი და გვარი", 
        labelPhone: "ტელეფონის ნომერი", 
        labelColor: "მასალა / ფერი", 
        btn: "შეკვეთის გაგზავნა", 
        placeholderName: "მაგ: გიორგი ბერიძე", 
        placeholderColor: "მაგ: მუხა, კაკალი...", 
        success: "მონაცემები წარმატებით გაიგზავნა!", 
        langShort: "KA", 
        flag: "ge" 
    },
    en: { 
        subtitle: "Fill out the order form", 
        labelName: "Full Name", 
        labelPhone: "Phone Number", 
        labelColor: "Material / Color", 
        btn: "Send Order", 
        placeholderName: "e.g. John Doe", 
        placeholderColor: "e.g. Oak, Walnut...", 
        success: "Data sent successfully!", 
        langShort: "EN", 
        flag: "us" 
    },
    ru: { 
        subtitle: "Заполните форму заказа", 
        labelName: "Имя и фамилия", 
        labelPhone: "Номер телефона", 
        labelColor: "Материал / Цвет", 
        btn: "Отправить заказ", 
        placeholderName: "напр. Иван Иванов", 
        placeholderColor: "напр. Дуб, Орех...", 
        success: "Данные успешно отправлены!", 
        langShort: "RU", 
        flag: "ru" 
    }
};

let currentLang = 'ka';

// ენის შეცვლის ფუნქცია
function changeLanguage(lang) {
    currentLang = lang;
    
    document.getElementById('subtitle').innerText = translations[lang].subtitle;
    document.getElementById('label-name').innerText = translations[lang].labelName;
    document.getElementById('label-phone').innerText = translations[lang].labelPhone;
    document.getElementById('label-color').innerText = translations[lang].labelColor;
    document.getElementById('submit-btn').innerText = translations[lang].btn;
    document.getElementById('input-name').placeholder = translations[lang].placeholderName;
    document.getElementById('input-color').placeholder = translations[lang].placeholderColor;
    
    const activeBtn = document.getElementById('active-lang');
    activeBtn.innerHTML = `<img src="https://flagcdn.com/w40/${translations[lang].flag}.png"> ${translations[lang].langShort}`;
}

// EmailJS კონფიგურაცია - აქ ჩასვი შენი რეალური კოდები!
(function() {
    emailjs.init("YOUR_PUBLIC_KEY"); // <-- ჩაწერე შენი Public Key
})();

document.getElementById('contact-form').addEventListener('submit', function(event) {
    event.preventDefault();
    
    const btn = document.getElementById('submit-btn');
    const originalText = btn.innerText;
    btn.innerText = "Sending...";
    btn.disabled = true;

    // აქ ჩაწერე შენი Service ID და Template ID
    emailjs.sendForm('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', this)
        .then(function() {
            alert(translations[currentLang].success);
            document.getElementById('contact-form').reset();
            btn.innerText = translations[currentLang].btn;
            btn.disabled = false;
        }, function(error) {
            alert("Error: " + JSON.stringify(error)); // თუ არ გაიგზავნა, აქ დაგვიწერს რატომ
            btn.innerText = translations[currentLang].btn;
            btn.disabled = false;
        });
}); </script>
   
</body>
</html>
