<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MinDWooD | Premium Woodwork</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --primary-color: #d4a373; --secondary-color: #8b5a2b; --bg-color: #1a1a1a; --text-color: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding-top: 110px; background-color: var(--bg-color); color: var(--text-color); min-height: 100vh; position: relative; overflow-x: hidden; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('image/background.jpg'); background-size: cover; background-position: center; background-attachment: fixed; filter: blur(6px) brightness(0.6); transform: scale(1.05); z-index: -1; }
        
        .navbar { position: fixed; top: 0; width: 100%; background: rgba(15, 15, 15, 0.95); display: flex; justify-content: space-between; align-items: center; padding: 10px 30px; box-sizing: border-box; border-bottom: 1px solid rgba(212, 163, 115, 0.2); z-index: 1000; backdrop-filter: blur(15px); }
        .nav-left { display: flex; align-items: center; gap: 15px; }
        .logo-img { width: 65px; height: 65px; object-fit: contain; padding: 5px; box-sizing: border-box; border-radius: 50%; border: 2px solid var(--primary-color); box-shadow: 0 0 15px rgba(212, 163, 115, 0.3); }
        .brand-name { font-weight: 800; font-size: 1.6rem; color: #fff; letter-spacing: 1px; }
        .brand-name span { color: var(--primary-color); font-weight: 900; }

        .dropdown { position: relative; display: inline-block; }
        .dropbtn { background: rgba(255, 255, 255, 0.05); color: #fff; padding: 8px 16px; font-size: 14px; font-weight: 600; border: 1px solid rgba(212, 163, 115, 0.3); border-radius: 20px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .dropdown-content { display: none; position: absolute; right: 0; top: 100%; background: #1e1e1e; min-width: 140px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid #333; overflow: hidden; z-index: 1001; margin-top: 5px; animation: fadeIn 0.2s ease; }
        .dropdown::after { content: ""; position: absolute; top: 100%; left: 0; width: 100%; height: 15px; display: none; }
        .dropdown:hover .dropdown-content, .dropdown:hover::after { display: block; }
        .dropdown-content button { color: #ccc; padding: 12px 16px; width: 100%; border: none; background: none; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .dropdown-content button:hover { background: #2a2a2a; color: var(--primary-color); }

        .container { max-width: 1100px; margin: 0 auto; padding: 20px; text-align: center; }
        .section-title { margin: 40px 0; font-size: 2rem; color: var(--primary-color); text-transform: uppercase; letter-spacing: 3px; }
        .section-title span { font-weight: 800; }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 60px; }
        .gallery-item { background: rgba(20, 20, 20, 0.8); border-radius: 15px; overflow: hidden; border: 1px solid rgba(212, 163, 115, 0.2); transition: 0.4s ease; cursor: pointer; backdrop-filter: blur(10px); }
        .gallery-item:hover { transform: scale(1.03); border-color: var(--primary-color); }
        .gallery-item img { width: 100%; height: 280px; object-fit: cover; display: block; }

        .lightbox { display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); justify-content: center; align-items: center; cursor: pointer; }
        .lightbox img { max-width: 90%; max-height: 85%; border: 2px solid var(--primary-color); border-radius: 10px; }
        .close-btn { position: absolute; top: 30px; right: 40px; color: white; font-size: 50px; cursor: pointer; }

        .map-container { max-width: 1100px; margin: 40px auto; padding: 10px; background: rgba(20, 20, 20, 0.8); border-radius: 20px; border: 1px solid rgba(212, 163, 115, 0.3); overflow: hidden; backdrop-filter: blur(10px); }
        .map-container iframe { border-radius: 15px; filter: grayscale(0.4); }
        .address-text { padding: 15px; color: var(--primary-color); font-size: 1.1rem; font-weight: 600; }

        .order-container { background: rgba(20, 20, 20, 0.8); max-width: 450px; margin: 40px auto 80px; padding: 40px; border-radius: 25px; border-top: 5px solid var(--secondary-color); backdrop-filter: blur(10px); }
        .input-group { margin-bottom: 22px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-size: 11px; color: var(--primary-color); font-weight: bold; text-transform: uppercase; }
        input { width: 100%; padding: 15px; background: rgba(30, 30, 30, 0.6); border: 1px solid #3d3d3d; border-radius: 10px; color: white; box-sizing: border-box; }
        button#submit-btn { width: 100%; padding: 18px; background: linear-gradient(45deg, var(--secondary-color), var(--primary-color)); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        footer { padding: 40px 20px; border-top: 1px solid #333; text-align: center; background: rgba(10,10,10,0.8); }
        .social-links { display: flex; justify-content: center; gap: 30px; margin-bottom: 20px; }
        .social-icon { color: #555; font-size: 26px; transition: 0.3s; }
        .social-icon:hover { color: var(--primary-color); transform: translateY(-5px); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <img src="image/logo.png" alt="MW" class="logo-img">
            <span class="brand-name">Min<span>D</span>Woo<span>D</span></span>
        </div>
        <div class="dropdown">
            <button class="dropbtn">
                <img src="https://flagcdn.com/w40/ge.png" width="18" id="current-flag"> 
                <span id="current-lang-text">KA</span>
                <i class="fas fa-chevron-down"></i>
            </button>
            <div class="dropdown-content">
                <button onclick="changeLanguage('ka')"><img src="https://flagcdn.com/w40/ge.png"> ქართული</button>
                <button onclick="changeLanguage('en')"><img src="https://flagcdn.com/w40/us.png"> English</button>
                <button onclick="changeLanguage('ru')"><img src="https://flagcdn.com/w40/ru.png"> Русский</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <h2 class="section-title" id="catalog-title">ჩვენი <span>კატალოგი</span></h2>
        <div class="gallery-grid" id="gallery"></div>

        <div id="lightbox" class="lightbox" onclick="closeLightbox()">
            <span class="close-btn">×</span>
            <img id="lightbox-img" src="">
        </div>

       <h2 class="section-title" id="map-title">ჩვენი <span>ლოკაცია</span></h2>
<div class="map-container">
    <iframe 
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2979.3113115456!2d41.6148332!3d41.6273413!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x4067860432174389%3A0x6b77c5d3d4b63e80!2s19%20Sulkhan-Saba%20Orbeliani%20St%2C%20Batumi!5e0!3m2!1sen!2sge!4v1711464000000!5m2!1sen!2sge" 
        width="100%" 
        height="450" 
        style="border:0;" 
        allowfullscreen="" 
        loading="lazy" 
        referrerpolicy="no-referrer-when-downgrade">
    </iframe>
    <div class="address-text" id="map-address">
        <i class="fas fa-map-marker-alt"></i> ბათუმი, სულხან-საბა ორბელიანის ქ. N19
    </div>
</div>
        <h2 class="section-title" id="order-title">გააკეთე <span>შეკვეთა</span></h2>
        <div class="order-container">
            <form id="contact-form">
                <div class="input-group">
                    <label id="label-name">სახელი და გვარი</label>
                    <input type="text" name="user_name" required>
                </div>
                <div class="input-group">
                    <label id="label-phone">ტელეფონის ნომერი</label>
                    <input type="tel" name="user_phone" required>
                </div>
                <div class="input-group">
                    <label id="label-color">მასალა / ფერი</label>
                    <input type="text" name="laminate_color" required>
                </div>
                <button type="submit" id="submit-btn">გაგზავნა</button>
            </form>
        </div>
    </div>

    <footer>
        <div class="social-links">
            <a href="https://www.facebook.com/OnlyMindwood" target="_blank" class="social-icon"><i class="fab fa-facebook"></i></a>
            <a href="#" class="social-icon"><i class="fab fa-instagram"></i></a>
        </div>
        <p>© 2026 MinDWooD. All rights reserved.</p>
    </footer>

    <script>
        const translations = {
            ka: { catalog: "ჩვენი <span>კატალოგი</span>", order: "გააკეთე <span>შეკვეთა</span>", map: "ჩვენი <span>ლოკაცია</span>", address: "<i class='fas fa-map-marker-alt'></i> ბათუმი, სულხან-საბა ორბელიანის ქ. N19", name: "სახელი და გვარი", phone: "ტელეფონის ნომერი", color: "მასალა / ფერი", btn: "გაგზავნა", success: "წარმატებით გაიგზავნა!", flag: "ge", lang: "KA" },
            en: { catalog: "Our <span>Catalog</span>", order: "Place an <span>Order</span>", map: "Our <span>Location</span>", address: "<i class='fas fa-map-marker-alt'></i> Batumi, Sulkhan-Saba Orbeliani St. N19", name: "Full Name", phone: "Phone Number", color: "Material / Color", btn: "Send Order", success: "Sent successfully!", flag: "us", lang: "EN" },
            ru: { catalog: "Наш <span>Каталог</span>", order: "Сделать <span>Заказ</span>", map: "Наша <span>Локация</span>", address: "<i class='fas fa-map-marker-alt'></i> Батуми, ул. Сулхан-Саба Орбелиани №19", name: "Имя и Фамилия", phone: "Номер телефона", color: "Материал / Цвет", btn: "Отправить", success: "Успешно отправлено!", flag: "ru", lang: "RU" }
        };

        const gallery = document.getElementById('gallery');
        for (let i = 1; i <= 14; i++) {
            const item = document.createElement('div');
            item.className = 'gallery-item';
            item.innerHTML = `<img src="image/surati${i}.jpg" alt="Work ${i}" onclick="openLightbox('image/surati${i}.jpg')" onerror="this.src='https://via.placeholder.com/300x280?text=Image+Missing'">`;
            gallery.appendChild(item);
        }

        function openLightbox(src) { document.getElementById('lightbox-img').src = src; document.getElementById('lightbox').style.display = 'flex'; document.body.style.overflow = 'hidden'; }
        function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; document.body.style.overflow = 'auto'; }

        function changeLanguage(lang) {
            document.getElementById('catalog-title').innerHTML = translations[lang].catalog;
            document.getElementById('order-title').innerHTML = translations[lang].order;
            document.getElementById('map-title').innerHTML = translations[lang].map;
            document.getElementById('map-address').innerHTML = translations[lang].address;
            document.getElementById('label-name').innerText = translations[lang].name;
            document.getElementById('label-phone').innerText = translations[lang].phone;
            document.getElementById('label-color').innerText = translations[lang].color;
            document.getElementById('submit-btn').innerText = translations[lang].btn;
            document.getElementById('current-lang-text').innerText = translations[lang].lang;
            document.getElementById('current-flag').src = `https://flagcdn.com/w40/${translations[lang].flag}.png`;
        }

        // EmailJS - აქ ჩასვი შენი რეალური აიდები ბრჭყალებში!
      (function() {
    emailjs.init("z7Rbd60fFzIzLwfFx"); // <-- ჩაწერე შენი Public Key
})();

document.getElementById('contact-form').addEventListener('submit', function(event) {
    event.preventDefault();
    
    const btn = document.getElementById('submit-btn');
    const originalText = btn.innerText;
    btn.innerText = "Sending...";
    btn.disabled = true;

    // აქ ჩაწერე შენი Service ID და Template ID
    emailjs.sendForm('service_1nq3807', 'template_dt0l18t', this)
                .then(function() {
                    alert("Success!");
                    document.getElementById('contact-form').reset();
                    btn.innerText = "SEND";
                    btn.disabled = false;
                }, function(error) {
                    alert("Error...");
                    btn.innerText = "SEND";
                    btn.disabled = false;
                });
        });
    </script>
</body>
</html>
